# Reranker: FastAPI + sentence-transformers + BAAI/bge-reranker-v2-m3 (cross-encoder).
# Запускается на GPU 1 — embedder занимает GPU 0.
#
# Запуск: docker compose up -d
# Логи:   docker compose logs -f
# Стоп:   docker compose down

services:
  reranker:
    build: .
    container_name: rerank-svc
    restart: unless-stopped

    environment:
      # Явно направляем на GPU 1, чтобы не конкурировать с embedder
      CUDA_VISIBLE_DEVICES: "1"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "127.0.0.1:8001:8001"

    volumes:
      - ${HOME}/models-cache:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      retries: 5
      start_period: 60s
